<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | Enterprise Portal</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="app-container">
        <aside>
            <div class="logo">ENTERPRISE PORTAL</div>
            <nav>
                <ul>
                    <li><a href="index.html">Dashboard</a></li>
                    <li><a href="reports.html" class="active">Reports</a></li>
                    <li><a href="upload.html">Upload Data</a></li>
                    <li><a href="errors.html">Error Log</a></li>
                </ul>
            </nav>
        </aside>
        
        <main>
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h1>Generated Reports</h1>
                    <p style="color: var(--text-secondary);">Manage and download automated reports</p>
                </div>
                <button onclick="App.runNewReport()" class="btn btn-primary">Run New Report</button>
            </header>

            <div class="table-container">
                <table id="reports-table">
                    <thead>
                        <tr>
                            <th>Run ID</th>
                            <th>Report Name</th>
                            <th>Status</th>
                            <th>Started At</th>
                            <th>Completed At</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="reports-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="assets/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            App.loadReports();
            setInterval(App.loadReports, 10000); // Poll every 10s
        });
    </script>
</body>
</html>
