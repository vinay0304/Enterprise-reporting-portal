services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: enterprise-sql
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=StrongPassword123
      - MSSQL_PID=Developer
    volumes:
      - sql_data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    container_name: enterprise-api
    ports:
      - "5000:80"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=EnterprisePortal;User Id=sa;Password=StrongPassword123;TrustServerCertificate=True;
    depends_on:
      - sqlserver

volumes:
  sql_data:
